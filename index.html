<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FundIt Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/lucide"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState } = React;

        const App = () => {
            const icons = window.lucide || window.Lucide;
            const { User, Plus, Settings, Heart } = icons || {};

            const [children, setChildren] = useState([
                { id: 1, name: "Leo", balance: 450, goal: 500, color: "#3b82f6" },
                { id: 2, name: "Maya", balance: 280, goal: 1000, color: "#a855f7" },
                { id: 3, name: "Sam", balance: 850, goal: 900, color: "#22c55e" }
            ]);

            const addFunds = (id, amount) => {
                setChildren(children.map(c => c.id === id ? { ...c, balance: Math.min(c.balance + amount, c.goal) } : c));
            };

            return (
                <div className="min-h-screen p-4">
                    <div className="max-w-md mx-auto bg-white rounded-3xl shadow-xl overflow-hidden p-6 mt-10">
                        <div className="flex justify-between items-center mb-8">
                            <h1 className="text-3xl font-black text-blue-600 tracking-tight">FundIt</h1>
                            <div className="text-gray-400">{Settings && <Settings size={24} />}</div>
                        </div>

                        <div className="space-y-6">
                            {children.map(child => (
                                <div key={child.id} className="p-4 border border-gray-100 rounded-2xl bg-gray-50/50">
                                    <div className="flex justify-between mb-2">
                                        <span className="font-bold text-gray-700">{child.name}</span>
                                        <span className="text-sm font-bold text-blue-600">${child.balance} / ${child.goal}</span>
                                    </div>
                                    <div className="w-full bg-gray-200 rounded-full h-3 mb-4">
                                        <div 
                                            className="h-full rounded-full transition-all duration-700"
                                            style={{ width: `${(child.balance / child.goal) * 100}%`, backgroundColor: child.color }}
                                        ></div>
                                    </div>
                                    <button 
                                        onClick={() => addFunds(child.id, 10)}
                                        className="w-full bg-white border-2 border-gray-200 py-2 rounded-xl text-sm font-bold hover:bg-gray-900 hover:text-white transition-all"
                                    >
                                        + Add $10
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
